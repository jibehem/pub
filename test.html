<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Minimal Git Crypto Editor</title>
  <script src="https://cdn.jsdelivr.net/npm/codejar@3.6.0/codejar.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/libsodium-wrappers@0.7.10/dist/modules/libsodium-wrappers.js"></script>
  <style>
    body { margin:0; display:flex; height:100vh; font-family:sans-serif; }
    #sidebar { width:300px; overflow:auto; border-right:1px solid #ccc; }
    #editor { flex:1; padding:10px; }
    #topbar { position:fixed; top:0; left:0; right:0; background:#eee; padding:5px; }
    #editorArea { margin-top:40px; height:calc(100% - 40px); }
    .file { cursor:pointer; padding:3px; }
  </style>
</head>
<body>

<div id="sidebar"></div>

<div id="editor">
  <div id="topbar">
    User <input id="user">
    Repo <input id="repo">
    PAT <input id="pat">
    Branch <input id="branch" value="main">
    Password <input id="password" type="password">
    <button onclick="newFile()">NEW</button>
    <button onclick="pushFile()">PUSH</button>
    <button onclick="loadTree()">LOAD</button>
  </div>
  <div id="editorArea" contenteditable="true"></div>
</div>

<script>
let jar;
let currentPath = "";

async function init() {
await sodium.ready;

const my = editor => {
let code = editor.textContent;
code = code.replace(
/\((\w+?)(\b)/g,
'(<font color="#8a2be2">$1</font>$2'
);
editor.innerHTML = code;
};


jar = CodeJar(document.getElementById('editorArea'), my);
}

init();

async function loadTree() {
  const user = userEl.value;
  const repo = repoEl.value;
  const branch = branchEl.value;
  const pat = patEl.value;

  const res = await fetch(`https://api.github.com/repos/${user}/${repo}/git/trees/${branch}?recursive=1`, {
    headers: { Authorization: `token ${pat}` }
  });

  const data = await res.json();
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = "";

  data.tree.forEach(item => {
    if(item.type === "blob") {
      const div = document.createElement("div");
      div.className = "file";
      div.innerText = item.path;
      div.onclick = () => openFile(item.path);
      sidebar.appendChild(div);
    }
  });
}

async function openFile(path) {
  currentPath = path;
  const user = userEl.value;
  const repo = repoEl.value;
  const branch = branchEl.value;
  const pat = patEl.value;
  const password = passwordEl.value;

  const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}?ref=${branch}`, {
    headers: { Authorization: `token ${pat}` }
  });

  const data = await res.json();
  const content = atob(data.content);

  const decrypted = decrypt(content, password);
  jar.updateCode(decrypted);
}

function newFile() {
  currentPath = prompt("Path du fichier:");
  jar.updateCode("");
}

async function pushFile() {
  const user = userEl.value;
  const repo = repoEl.value;
  const branch = branchEl.value;
  const pat = patEl.value;
  const password = passwordEl.value;

  const content = jar.toString();
  const encrypted = encrypt(content, password);
  const b64 = btoa(encrypted);

  let sha = null;

  // check si fichier existe
  try {
    const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${currentPath}`, {
      headers: { Authorization: `token ${pat}` }
    });
    const data = await res.json();
    sha = data.sha;
  } catch {}

  await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${currentPath}`, {
    method: "PUT",
    headers: {
      Authorization: `token ${pat}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: "update via web editor",
      content: b64,
      branch: branch,
      sha: sha
    })
  });

  alert("Pushed !");
  loadTree();
}

function encrypt(text, password) {
  const key = sodium.crypto_generichash(32, password);
  const nonce = sodium.randombytes_buf(12);
  const encrypted = sodium.crypto_aead_chacha20poly1305_ietf_encrypt(
    text,
    null,
    null,
    nonce,
    key
  );
  return btoa(String.fromCharCode(...nonce)) + ":" + btoa(String.fromCharCode(...encrypted));
}

function decrypt(data, password) {
  const key = sodium.crypto_generichash(32, password);
  const [nonceB64, encB64] = data.split(":");
  const nonce = Uint8Array.from(atob(nonceB64), c => c.charCodeAt(0));
  const enc = Uint8Array.from(atob(encB64), c => c.charCodeAt(0));

  const decrypted = sodium.crypto_aead_chacha20poly1305_ietf_decrypt(
    null,
    enc,
    null,
    nonce,
    key
  );

  return new TextDecoder().decode(decrypted);
}

// shortcuts DOM
const userEl = document.getElementById("user");
const repoEl = document.getElementById("repo");
const patEl = document.getElementById("pat");
const branchEl = document.getElementById("branch");
const passwordEl = document.getElementById("password");

</script>

</body>
</html>
