<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Crypto Editor</title>
  
  <style>
    body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background:#111; color:#999;}
    #sidebar { width: 300px; overflow: auto; border-right: 1px solid #ccc; }
    #editor { flex: 1; padding: 10px; }
    #topbar { position: fixed; top: 0; left: 0; right: 0; background: #eee; padding: 5px; z-index: 10; }
    #editorArea { margin-top: 40px; height: calc(100% - 40px); border: 1px solid #ddd; }
    .file { cursor: pointer; padding: 3px; }
    input, button {margin:4px; padding:6px; background:#222; color:#999; border:1px solid #999;}
  </style>
</head>
<body>

<div id="sidebar"></div>

<div id="editor">
  <div id="topbar">
    User <input id="user">
    Repo <input id="repo">
    PAT <input id="pat">
    Branch <input id="branch" value="main">
    Password <input id="password" type="password">
    <button onclick="loadTree()">LOAD</button>
    <button onclick="newFile()">NEW</button>
    <button onclick="pushFile()">PUSH</button>
  </div>
  <div id="editorArea" contenteditable="true"></div>
</div>

<script type="module">
import { CodeJar } from 'https://cdn.jsdelivr.net/npm/codejar@3.6.0/+esm';
let currentPath = "";


// Initialisation de l'éditeur CodeJar
const editorElement = document.getElementById("editorArea");
const my = editorElement => {
let code = editorElement.textContent;
code = code.replace(
/\((\w+?)(\b)/g,
'(<font color="#8a2be2">$1</font>$2'
);
editorElement.innerHTML = code;
};

const jar = CodeJar(editorElement, my);



// Charge l'arborescence des fichiers
async function loadTree() {
  const user = document.getElementById("user").value;
  const repo = document.getElementById("repo").value;
  const branch = document.getElementById("branch").value;
  const pat = document.getElementById("pat").value;

  const res = await fetch(`https://api.github.com/repos/${user}/${repo}/git/trees/${branch}?recursive=1`, {
    headers: { Authorization: `token ${pat}` }
  });

  const data = await res.json();
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = "";  // Vide la sidebar avant de la remplir

  data.tree.forEach(item => {
    if (item.type === "blob") {
      const div = document.createElement("div");
      div.className = "file";
      div.innerText = item.path;
      div.onclick = () => openFile(item.path);
      sidebar.appendChild(div);
    }
  });
}

// Ouvre un fichier depuis l'arborescence
async function openFile(path) {
  currentPath = path;
  const user = document.getElementById("user").value;
  const repo = document.getElementById("repo").value;
  const branch = document.getElementById("branch").value;
  const pat = document.getElementById("pat").value;
  const password = document.getElementById("password").value;

  const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}?ref=${branch}`, {
    headers: { Authorization: `token ${pat}` }
  });

  const data = await res.json();
  const content = atob(data.content);

  const decrypted = await decrypt(content, password);
  jar.updateCode(decrypted);
}

// Création d'un nouveau fichier
function newFile() {
  currentPath = prompt("Path du fichier:");
  jar.updateCode("");  // Vider l'éditeur
}

// Push les changements
async function pushFile() {
  const user = document.getElementById("user").value;
  const repo = document.getElementById("repo").value;
  const branch = document.getElementById("branch").value;
  const pat = document.getElementById("pat").value;
  const password = document.getElementById("password").value;

  const content = jar.toString();
  const encrypted = await encrypt(content, password);
  const b64 = btoa(encrypted);

  let sha = null;

  // Vérifier si le fichier existe
  try {
    const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${currentPath}`, {
      headers: { Authorization: `token ${pat}` }
    });
    const data = await res.json();
    sha = data.sha;
  } catch {}

  await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${currentPath}`, {
    method: "PUT",
    headers: {
      Authorization: `token ${pat}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: "update via web editor",
      content: b64,
      branch: branch,
      sha: sha
    })
  });

  alert("Pushed !");
  loadTree();  // Recharger l'arborescence après push
}

// Fonction de chiffrement (ChaCha20-Poly1305 avec Web Crypto API)
async function encrypt(text, password) {
  const key = await getKey(password);
  const iv = crypto.getRandomValues(new Uint8Array(12));

  const encoded = new TextEncoder().encode(text);

  const ciphertext = await crypto.subtle.encrypt(
    {
      name: "ChaCha20-Poly1305",
      iv: iv
    },
    key,
    encoded
  );

  return new Uint8Array([...iv, ...new Uint8Array(ciphertext)]);  // Renvoie la combinaison IV + ciphertext
}

// Fonction de déchiffrement (ChaCha20-Poly1305 avec Web Crypto API)
async function decrypt(data, password) {
  const iv = data.slice(0, 12);
  const ciphertext = data.slice(12);

  const key = await getKey(password);

  const decrypted = await crypto.subtle.decrypt(
    {
      name: "ChaCha20-Poly1305",
      iv: iv
    },
    key,
    ciphertext
  );

  return new TextDecoder().decode(decrypted);
}

// Génère une clé à partir du mot de passe
async function getKey(password) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw",
    enc.encode(password),
    "PBKDF2",
    false,
    ["deriveKey"]
  );

  return crypto.subtle.deriveKey(
    {
      name: "PBKDF2",
      salt: enc.encode("salt"),  // Utilise un "salt" statique pour simplifier
      iterations: 100000,
      hash: "SHA-256"
    },
    keyMaterial,
    {
      name: "ChaCha20-Poly1305",
      length: 256
    },
    false,
    ["encrypt", "decrypt"]
  );
}

</script>
</body>
</html>
